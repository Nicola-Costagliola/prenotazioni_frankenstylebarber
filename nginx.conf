server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # QUESTA È LA REGOLA FONDAMENTALE
        # Cerca prima il file esatto ($uri), poi una directory ($uri/), 
        # se non trova nulla, rimanda tutto a /index.html
        try_files $uri $uri/ /index.html;
    }

    # Configurazione opzionale per gestire gli errori del server
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}