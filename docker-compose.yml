version: '3.9'

services:
  barber-be:
    build:
      context: ../frankenstylebarber
      dockerfile: Dockerfile
    container_name: barber-be
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - barber-net

  barber-fe:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.frankenstylebarber.it/api/events
    container_name: barber-fe
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - barber-be
    networks:
      - barber-net

  nginx:
    image: nginx:latest
    container_name: barber-nginx
    restart: unless-stopped
    depends_on:
      - barber-fe
      - barber-be
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/fullchain3.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./certs/_.frankenstylebarber.it_private_key.key:/etc/ssl/private/_.frankenstylebarber.it_private_key.key:ro
    networks:
      - barber-net

networks:
  barber-net:
    driver: bridge
